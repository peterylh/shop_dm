types:
  BIZ_MODULE:
    label: 业务板块简写
    desc: 如 WEMG=财富管理, FRTN=零售
    regex: "^[A-Z0-9]+$"

  DOMAIN_CODE:
    label: 数据域编号
    regex: "^[0-9]{2}$"

  BIZ_PROCESS:
    label: 业务过程
    regex: "^[A-Z][A-Z0-9]*$"

  ENTITY:
    label: 实体简写
    desc: 业务实体名称，如 CUST=客户, PROD=产品
    regex: "^[A-Z][A-Z0-9]*$"


  METRICS_DESC:
    label: 核心指标描述
    desc:  核心指标描述
    regex: "^[A-Z][A-Z0-9_]*$"

  TIME_PERIOD:
    label: 时间周期
    values: [D, W, M, Q, Y, S]

  DWD_GRANULARITY:
    label: DWD粒度后缀
    desc: I=事务增量, F=周期快照, A=累积快照
    values: [I, F, A]

  DWS_GRANULARITY:
    label: DWS粒度后缀
    desc: S=明细汇总, F=快照, A=累积
    values: [S, F, A]

  ADS_PREFIX:
    label: ADS应用前缀
    regex: "^A[0-9]+$"

  ADS_TOPIC:
    label: ADS主题
    regex: "^[A-Z][A-Z0-9]*$"

  ADS_GRANULARITY:
    label: ADS粒度后缀
    values: [S, F, A]

  DIM_SCOPE:
    label: 维度范围
    values: [BASE, ADDT]

  DIM_DESC:
    label: 维度描述
    desc:  维度描述
    regex: "^[A-Z][A-Z0-9_]*$"

  DIM_TYPE:
    label: 维度表类型
    values: [TAG, INFO, TREE]

  prefix_field:
    label: 字段前缀
    values: [is, has, can]

  suffix_field:
    label: 字段后缀
    values: [id, "no", code, name, desc, type, status, date, time, amt, cnt, qty, rate, pct, idx, flg, flag, ind, url, path, md5, json]

columns:
  segments: ["$prefix_field?", $ENTITY, "$suffix_field?"]
  common_columns:
    - etl_time
    - snapshot_date
    - create_time
    - update_time

layers:
  - [DIM, DWD]
  - DWS
  - ADS

table:
  constraints:
    max_length: 30
  templates:
    DWD:
      - [M, $BIZ_MODULE, $DOMAIN_CODE, $BIZ_PROCESS, $TIME_PERIOD, "$+DWD_GRANULARITY"]
    DWS:
      - [I, $BIZ_MODULE, $ENTITY, $ENTITY, $METRICS_DESC, $TIME_PERIOD, "$+DWS_GRANULARITY"]
    ADS:
      - [$ADS_PREFIX, $ADS_TOPIC, $TIME_PERIOD, "$+ADS_GRANULARITY"]
    DIM:
      - [DIM, $DIM_SCOPE, $ENTITY, $DIM_DESC, $DIM_TYPE]
      - [DIM, PM, $DIM_DESC]
