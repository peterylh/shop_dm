# ============================================================
# 命名规范配置
# ============================================================
# types: 段类型定义
#   regex - 正则校验
#   values - 枚举白名单
# table: 各层的表名模板
#   YAML 列表格式: 段名列表，段间自动用 _ 连接
#   ? 后缀 = 可选段（缺失时相邻 _ 也不出现）
# columns: 字段名模板与通用列白名单

types:
  source:
    label: 来源系统
    desc: 来源业务系统或 CDC 标识
    regex: "^[a-z0-9]+$"
  entity:
    label: 业务实体
    desc: 业务主体名称
    regex: "^[a-z][a-z0-9_]*$"
  business_view:
    label: 业务视图
    desc: ADS 层业务视图名称
    regex: "^[a-z][a-z0-9_]*$"
  load_type:
    label: 装载类型
    desc: 全量/增量标识
    values: [full, inc]
  time_granularity:
    label: 时间粒度
    desc: 汇总时间周期
    values: [daily, monthly, weekly, yearly]
  prefix_field:
    label: 字段限定前缀
    desc: 度量或布尔限定词
    values: [min, max, avg, sum, first, last, is, has]
  suffix_field:
    label: 字段后缀类型
    desc: 字段的业务类型后缀
    values:
      - id
      - name
      - code
      - date
      - time
      - amount
      - price
      - cost
      - count
      - quantity
      - status
      - type
      - level
      - score
      - segment
      - method
      - num
      - rate
      - ratio
      - flag
      - desc
      - note

table:
  ODS: [ods, $source, $entity, $load_type]
  DWD: [dwd, $entity]
  DWS: [dws, $entity, "$time_granularity?"]
  ADS: [ads, $business_view]
  DIM: [dim, $entity]

columns:
  segments: ["$prefix_field?", $entity, "$suffix_field?"]
  common_columns:
    - etl_time
    - snapshot_date
    - create_time
    - update_time
